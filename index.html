<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>にゃんぽ翻訳 🐾</title>
  <style>
    /* ===== 変数 ===== */
    :root {
      --orange:       #FF6B35;
      --orange-light: #FFF2ED;
      --orange-mid:   #FFD5C2;
      --text:         #2C2C2C;
      --text-sub:     #888;
      --border:       #E8E8E8;
      --bg:           #FFFFFF;
      --bg-right:     #FAFAF8;
      --shadow:       0 4px 20px rgba(0,0,0,0.07);
      --radius:       18px;
    }

    /* ===== リセット ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #F4F2EF;
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
    }

    .logo span { font-size: 26px; }

    .tagline {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* ===== メイン ===== */
    main {
      max-width: 960px;
      margin: 28px auto;
      padding: 0 16px;
    }

    /* ===== カード全体 ===== */
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: visible;
    }

    /* ===== 言語ラベル行 ===== */
    .lang-bar {
      display: grid;
      grid-template-columns: 1fr 72px 1fr;
      border-bottom: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
    }

    .lang-tab {
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-sub);
    }

    .lang-tab.left  { color: var(--orange); border-bottom: 2px solid var(--orange); }
    .lang-tab.right { background: var(--bg-right); border-left: 1px solid var(--border); }
    .lang-tab .icon { font-size: 17px; }

    .lang-bar-center {
      background: var(--bg-right);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ===== 本体 ===== */
    .body {
      display: grid;
      grid-template-columns: 1fr 72px 1fr;
      min-height: 260px;
    }

    /* ===== 左パネル（入力） ===== */
    .left-panel {
      padding: 18px 20px 14px;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      font-family: inherit;
      line-height: 1.7;
      min-height: 150px;
    }

    textarea::placeholder { color: #C8C8C8; font-size: 15px; }

    .char-hint {
      font-size: 11px;
      color: #CCC;
      text-align: right;
      margin-top: 4px;
    }

    /* ===== 中央パネル（ボタン） ===== */
    .center-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-right);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .translate-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--orange);
      border: none;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(255,107,53,0.35);
      transition: transform 0.18s, box-shadow 0.18s;
      color: #fff;
    }

    .translate-btn:hover {
      transform: scale(1.1) rotate(15deg);
      box-shadow: 0 5px 18px rgba(255,107,53,0.45);
    }

    .translate-btn:active { transform: scale(0.93); }

    /* ===== 右パネル（結果） ===== */
    .right-panel {
      background: var(--bg-right);
      padding: 18px 20px 14px;
      display: flex;
      flex-direction: column;
      border-radius: 0 0 var(--radius) 0;
    }

    .result-area {
      flex: 1;
      min-height: 150px;
    }

    .result-placeholder {
      color: #D0D0D0;
      font-size: 15px;
      line-height: 1.7;
    }

    .result-text {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text);
      display: none;
      white-space: pre-wrap;
    }

    /* ===== ローディング ===== */
    .loading {
      display: none;
      align-items: center;
      gap: 7px;
      color: var(--text-sub);
      font-size: 13px;
    }

    .loading.show { display: flex; }

    .dot {
      width: 7px; height: 7px;
      background: var(--orange);
      border-radius: 50%;
      animation: bounce 0.65s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.12s; }
    .dot:nth-child(3) { animation-delay: 0.24s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-7px); }
    }

    /* ===== 気分バッジ ===== */
    .mood-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--orange-light);
      border: 1px solid var(--orange-mid);
      border-radius: 10px;
      padding: 9px 14px;
      margin-top: 14px;
      font-size: 13px;
    }

    .mood-badge.show { display: flex; }
    .mood-emoji   { font-size: 22px; }
    .mood-label   { color: var(--text-sub); font-size: 12px; }
    .mood-val     { font-weight: 700; color: var(--orange); }

    /* ===== 下部ツールバー ===== */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--orange-light);
      border-color: var(--orange);
      color: var(--orange);
    }

    .btn-icon {
      padding: 7px;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      justify-content: center;
    }

    .btn-mic.active {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.4); }
      50%       { box-shadow: 0 0 0 7px rgba(255,107,53,0); }
    }

    .spacer { flex: 1; }

    /* ===== トースト ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #333;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.28s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== フッター ===== */
    footer {
      text-align: center;
      color: var(--text-sub);
      font-size: 12px;
      padding: 20px 0 32px;
    }

    /* ===== スマホ対応 ===== */
    @media (max-width: 620px) {
      header { padding: 12px 16px; }
      .logo  { font-size: 19px; }
      main   { margin: 14px auto; padding: 0 10px; }

      .lang-bar, .body {
        grid-template-columns: 1fr;
      }

      .lang-bar-center { display: none; }

      .lang-tab.right {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .center-panel {
        border-left: none;
        border-right: none;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 14px;
        flex-direction: row;
        background: var(--bg-right);
      }

      .right-panel { border-top: 1px solid var(--border); }

      textarea { min-height: 120px; }
      .result-area { min-height: 100px; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div>
    <div class="logo"><span>🐱</span> にゃんぽ翻訳</div>
    <div class="tagline">世界初・猫語自動翻訳システム（非公式・無保証）</div>
  </div>
</header>

<!-- メイン -->
<main>
  <div class="card">

    <!-- 言語ラベル -->
    <div class="lang-bar">
      <div class="lang-tab left">  <span class="icon">🐾</span> 猫語</div>
      <div class="lang-bar-center"></div>
      <div class="lang-tab right"> <span class="icon">💬</span> 人間語</div>
    </div>

    <!-- 本体 -->
    <div class="body">

      <!-- 左：入力 -->
      <div class="left-panel">
        <textarea
          id="catInput"
          placeholder="猫語を入力してください…&#10;例）ニャーン　ゴロゴロ　シャーッ　アオーン　カカカ"
          maxlength="500"
          oninput="onInput()"
        ></textarea>
        <div class="char-hint"><span id="cnt">0</span> / 500</div>
        <div class="toolbar">
          <button class="btn btn-icon btn-mic" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
          <button class="btn" onclick="clearAll()">✕ クリア</button>
        </div>
      </div>

      <!-- 中央：変換ボタン -->
      <div class="center-panel">
        <button class="translate-btn" onclick="doTranslate()" title="翻訳する（Enter でも可）">🔄</button>
      </div>

      <!-- 右：結果 -->
      <div class="right-panel">
        <div class="result-area">
          <div class="loading" id="loading">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span>解読中…</span>
          </div>
          <p  class="result-placeholder" id="placeholder">翻訳結果がここに表示されます</p>
          <div class="result-text"        id="resultText"></div>
        </div>

        <div class="mood-badge" id="moodBadge">
          <span class="mood-emoji" id="moodEmoji"></span>
          <div>
            <div class="mood-label">🐱 猫の気分</div>
            <div class="mood-val"  id="moodVal"></div>
          </div>
        </div>

        <div class="toolbar" id="resultToolbar" style="display:none">
          <button class="btn" id="speakBtn" onclick="speakResult()">🔊 読み上げ</button>
          <button class="btn"               onclick="copyResult()">📋 コピー</button>
        </div>
      </div>

    </div><!-- /.body -->
  </div><!-- /.card -->
</main>

<footer>🐾 猫語の解釈には個体差があります。参考程度にどうぞ。</footer>

<div class="toast" id="toast">📋 コピーしました！</div>

<!-- ===== JavaScript ===== -->
<script>
// ──────────────────────────────────────────────
// 翻訳辞書
// ──────────────────────────────────────────────
const DICT = [

  // ── 発情期：アオーン・ンニャーオ（最優先で検出） ──
  {
    rx: [/アオーン|あおーん|アオン|あおん|ンニャーオ|んにゃーお/],
    say: [
      "今すぐ外に出してください。とても重要な用事があります。急いでください。",
      "こんなに大きな声で訴えているのに、なぜわかってくれないんですか。",
      "世界中に聞こえるように叫んでいます。私の気持ちは本物です。",
      "これは緊急事態です。一刻も早く対応してください。お願いではなく要求です。"
    ],
    mood: { e:"🔊", t:"緊急・全力で訴え中" }
  },

  // ── 威嚇：シャーッ ──
  {
    rx: [/シャ[ーっ]+|しゃ[ーっ]+/],
    say: [
      "触らないでください。今日のあなたは嫌いです。近づかないでください。",
      "これ以上来たら、後悔することになりますよ。本気で言っています。",
      "私の機嫌がわかりませんか。今すぐ空気を読んでください。",
      "今すぐ離れてください。お願いではなく命令です。"
    ],
    mood: { e:"😾", t:"全力で拒絶中" }
  },

  // ── 威嚇：ウーッ・マーオ（低くうなる） ──
  {
    rx: [/ウ[ーっ]+|う[ーっ]{2,}|マーオ|まーお/],
    say: [
      "これ以上近づいたら、あなたとの友好関係は終わりです。",
      "私は今、本気で怒っています。笑わないでください。",
      "最後の警告です。次は本当にひっかきます。覚悟してください。",
      "今日のあなたは気に入らない。理由は言いません。ただ気に入らない。"
    ],
    mood: { e:"😤", t:"本気の警告" }
  },

  // ── 不安・不満：長めのニャーオ・ミャーオ ──
  {
    rx: [/ニャーオ|にゃーお|ミャーオ|みゃーお/],
    say: [
      "おなかがすいて、私は少しいらだっています。早めに対応してください。",
      "かまってもらえないと不安になるんです。あなたが悪いんです。",
      "なんで私の言うことを聞いてくれないの。もう一度言います。聞いてください。",
      "いつもより遅い。ごはんの時間はちゃんと守ってほしいんです。",
      "ねえ、聞こえてますか？私のこと、忘れてませんか？"
    ],
    mood: { e:"😿", t:"不満・不安" }
  },

  // ── 嬉しい・甘えている：ゴロゴロ（喉を鳴らす） ──
  {
    rx: [/ごろごろ|ゴロゴロ|ぐるぐる/],
    say: [
      "最高です。このまま永遠に続けてください。絶対に止めないでください。",
      "今の私、とても幸せです。あなたのこと、今日は好きです。",
      "これが天国というものですね。なでるのをやめたら許しません。",
      "もっと、もっとなでて。この感じがたまらないんです。",
      "幸せすぎて何も考えられません。このまま溶けてしまいそう。"
    ],
    mood: { e:"😸", t:"最高に幸せ" }
  },

  // ── 嬉しい・甘えている：高い声のニャーン ──
  {
    rx: [/ニャーン|にゃーん|にゃ[ーん]{2,}/],
    say: [
      "おかえり。遅かったね。ずっと待ってたよ。",
      "あなたのことが好きです。今日はちょっとだけ甘えさせてください。",
      "なでてください。今の私、そういう気分なんです。",
      "今日はずっとそばにいてほしい。どこにも行かないでね。",
      "会いたかったよ。なんで急にいなくなるの。"
    ],
    mood: { e:"😻", t:"甘えたい" }
  },

  // ── 嬉しい：ごはんを食べながらウニャウニャ ──
  {
    rx: [/ウニャ|うにゃ/],
    say: [
      "おいしい。これ、おいしいです。最高です。",
      "ごはんの時間が一番好き。今は邪魔しないでください。",
      "食べながらでも言います。これ、昨日のより断然いいです。",
      "今話しかけないでください。食事に集中しています。でも、おいしい。"
    ],
    mood: { e:"😋", t:"ごはんに夢中" }
  },

  // ── 興味・狩猟本能：クルル・カカカ・ケケケ ──
  {
    rx: [/クルル|くるる|カカカ|かかか|ケケケ|けけけ|かっかっ|カッカッ|ちゅ[るーっ]+/],
    say: [
      "あそこに何かいます。私のハンター本能が叫んでいます。絶対に逃がしません。",
      "見てください、あれ。あの動き、気になってしょうがない。",
      "窓の向こうに鳥がいます。捕まえられないのはわかってる。でも捕まえたい。",
      "もしガラスがなかったら、今頃大活躍していました。",
      "狩りの時間です。誰も邪魔しないでください。"
    ],
    mood: { e:"😼", t:"狩猟本能全開" }
  },

  // ── 繰り返し要求：にゃーにゃー ──
  {
    rx: [/にゃーにゃー|にゃんにゃん|にゃにゃにゃ|ニャーニャー/],
    say: [
      "ごはんをください。今すぐ。待つのが嫌いなんです。",
      "何度も言います。ごはんです。ごはん。お願いではなく要求です。",
      "私の要求は明確です。ごはんと、なでると、かまうこと。全部今すぐ。",
      "おなかがすいて私はいらだっているのです。早く気づいてください。"
    ],
    mood: { e:"😾", t:"要求モード全開" }
  },

  // ── 不機嫌：ふーっ ──
  {
    rx: [/ふ[ーっ]+/],
    say: [
      "不満があります。察してください。",
      "今日はあなたのことが嫌いです。理由は聞かないでください。",
      "近づかないでください。今、機嫌が悪いんです。",
      "何かを踏んだか、何かが気に食わないか、どちらかです。どちらにせよ機嫌が悪い。"
    ],
    mood: { e:"😾", t:"不機嫌" }
  },

  // ── 眠い・ぼんやり ──
  {
    rx: [/くぅ[ーん]|きゅ[ーん]|むにゃ|ムニャ/],
    say: [
      "少し眠いです。邪魔しないでください。あと三時間は動きません。",
      "夢の入り口にいます。静かにしてください。",
      "起こさないでください。怒ります。",
      "今日はもう十四時間寝ました。あと少し寝ます。"
    ],
    mood: { e:"😴", t:"まったり眠い" }
  },

  // ── 爆睡 ──
  {
    rx: [/zzz|すやすや|すーすー/i],
    say: [
      "…（完全に夢の世界にいます。起こしたら許しません）",
      "…（今日いちばん幸せな時間です。邪魔しないでください）",
      "…（おいしい夢を見ています。何の夢かは秘密です）"
    ],
    mood: { e:"😴", t:"爆睡中" }
  },

  // ── ふつうのにゃー（短い・単発） ──
  {
    rx: [/^[にニ][ゃャ]$|^[にニ][ゃャ][ーん]$|にゃ[。！\s]|にゃ$/m],
    say: [
      "おかえり。遅かったね。",
      "ちょっといいですか？大した用ではないけれど。",
      "今、あなたのことを呼びました。気づいてください。",
      "ねえ。ねえ。ねえってば。",
      "なんでもないです。ただ声をかけたかっただけです。"
    ],
    mood: { e:"🐱", t:"ふつう" }
  },
];

const DEFAULTS = [
  "解読に時間がかかりました。おそらく「今すぐかまってください」という意味だと思います。",
  "これは難解な猫語です。「そこは私の場所なので退いてください」に違いありません。",
  "上位2%の猫しか使わない高度な表現です。たぶん「おやつ」の話です。",
  "意味はわかりませんでした。でも、なんとなくごはんか睡眠の話だと思います。",
  "翻訳完了。「なでてもいいですよ。でも飽きたら怒ります」という意味です。",
  "解析結果：あなたが少し遅く帰ってきたことへの、やんわりとした抗議です。"
];

const DEFAULT_MOODS = [
  { e:"🐱", t:"謎めいた気分" },
  { e:"😸", t:"秘密の気分" },
  { e:"🐾", t:"猫的にはふつう" },
  { e:"🤔", t:"考え中" }
];

// 追記ランダム（25%確率）
const EXTRAS = [
  "\n\nなお、おやつがあれば機嫌が直ります。",
  "\n\n以上です。返事は不要です。",
  "\n\nあと、ごはんの皿を洗っておいてください。",
  "\n\nこの翻訳に誤りがあっても責任は取れません。"
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function translate(input) {
  if (!input.trim()) return null;
  for (const entry of DICT) {
    for (const rx of entry.rx) {
      if (rx.test(input)) {
        const extra = Math.random() < 0.3 ? pick(EXTRAS) : "";
        return { text: pick(entry.say) + extra, mood: entry.mood };
      }
    }
  }
  return { text: pick(DEFAULTS), mood: pick(DEFAULT_MOODS) };
}

// ──────────────────────────────────────────────
// UI操作
// ──────────────────────────────────────────────
function onInput() {
  document.getElementById('cnt').textContent =
    document.getElementById('catInput').value.length;
}

function clearAll() {
  document.getElementById('catInput').value = '';
  onInput();
  showPlaceholder();
}

function showPlaceholder() {
  document.getElementById('placeholder').style.display  = '';
  document.getElementById('resultText').style.display   = 'none';
  document.getElementById('moodBadge').classList.remove('show');
  document.getElementById('resultToolbar').style.display = 'none';
}

function doTranslate() {
  const input = document.getElementById('catInput').value;
  if (!input.trim()) {
    document.getElementById('catInput').focus();
    return;
  }

  // ローディング表示
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('resultText').style.display  = 'none';
  document.getElementById('moodBadge').classList.remove('show');
  document.getElementById('resultToolbar').style.display = 'none';
  document.getElementById('loading').classList.add('show');

  setTimeout(() => {
    const res = translate(input);
    document.getElementById('loading').classList.remove('show');
    if (!res) return;

    document.getElementById('resultText').textContent = res.text;
    document.getElementById('resultText').style.display = '';
    document.getElementById('moodEmoji').textContent = res.mood.e;
    document.getElementById('moodVal').textContent   = res.mood.t;
    document.getElementById('moodBadge').classList.add('show');
    document.getElementById('resultToolbar').style.display = '';
  }, 550);
}

// Enter で翻訳（Shift+Enter は改行）
document.getElementById('catInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTranslate(); }
});

// ──────────────────────────────────────────────
// 音声入力
// ──────────────────────────────────────────────
let recog = null, isRec = false;

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('このブラウザは音声入力に対応していません。\nGoogle Chrome をお試しください。'); return; }

  if (isRec) { recog.stop(); return; }

  recog = new SR();
  recog.lang = 'ja-JP';
  recog.continuous = false;
  recog.interimResults = false;

  recog.onstart = () => {
    isRec = true;
    const b = document.getElementById('micBtn');
    b.textContent = '⏹';
    b.classList.add('active');
  };

  recog.onresult = e => {
    document.getElementById('catInput').value = e.results[0][0].transcript;
    onInput();
    setTimeout(doTranslate, 300);
  };

  recog.onerror = e => console.warn('音声入力エラー:', e.error);

  recog.onend = () => {
    isRec = false;
    const b = document.getElementById('micBtn');
    b.textContent = '🎤';
    b.classList.remove('active');
  };

  recog.start();
}

// ──────────────────────────────────────────────
// 読み上げ
// ──────────────────────────────────────────────
function speakResult() {
  const text = document.getElementById('resultText').textContent;
  if (!text || !window.speechSynthesis) return;

  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = 'ja-JP';
  u.rate  = 0.88;
  u.pitch = 1.1;

  const btn = document.getElementById('speakBtn');
  btn.textContent = '🔊 読み上げ中…';
  u.onend = () => { btn.textContent = '🔊 読み上げ'; };
  window.speechSynthesis.speak(u);
}

// ──────────────────────────────────────────────
// コピー
// ──────────────────────────────────────────────
function copyResult() {
  const text = document.getElementById('resultText').textContent;
  if (!text) return;

  const show = () => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(show);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    show();
  }
}
</script>
