<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>にゃんぽ翻訳 🐾</title>
  <style>
    /* ===== 変数 ===== */
    :root {
      --orange:       #FF6B35;
      --orange-light: #FFF2ED;
      --orange-mid:   #FFD5C2;
      --text:         #2C2C2C;
      --text-sub:     #888;
      --border:       #E8E8E8;
      --bg:           #FFFFFF;
      --bg-right:     #FAFAF8;
      --shadow:       0 4px 20px rgba(0,0,0,0.07);
      --radius:       18px;
    }

    /* ===== リセット ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #F4F2EF;
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
    }

    .logo span { font-size: 26px; }

    .tagline {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* ===== メイン ===== */
    main {
      max-width: 960px;
      margin: 28px auto;
      padding: 0 16px;
    }

    /* ===== カード全体 ===== */
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: visible;
    }

    /* ===== 言語ラベル行 ===== */
    .lang-bar {
      display: grid;
      grid-template-columns: 1fr 72px 1fr;
      border-bottom: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
    }

    .lang-tab {
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-sub);
    }

    .lang-tab.left  { color: var(--orange); border-bottom: 2px solid var(--orange); }
    .lang-tab.right { background: var(--bg-right); border-left: 1px solid var(--border); }
    .lang-tab .icon { font-size: 17px; }

    .lang-bar-center {
      background: var(--bg-right);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ===== 本体 ===== */
    .body {
      display: grid;
      grid-template-columns: 1fr 72px 1fr;
      min-height: 260px;
    }

    /* ===== 左パネル（入力） ===== */
    .left-panel {
      padding: 18px 20px 14px;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      font-family: inherit;
      line-height: 1.7;
      min-height: 150px;
    }

    textarea::placeholder { color: #C8C8C8; font-size: 15px; }

    .char-hint {
      font-size: 11px;
      color: #CCC;
      text-align: right;
      margin-top: 4px;
    }

    /* ===== 中央パネル（ボタン） ===== */
    .center-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-right);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .translate-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--orange);
      border: none;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(255,107,53,0.35);
      transition: transform 0.18s, box-shadow 0.18s;
      color: #fff;
    }

    .translate-btn:hover {
      transform: scale(1.1) rotate(15deg);
      box-shadow: 0 5px 18px rgba(255,107,53,0.45);
    }

    .translate-btn:active { transform: scale(0.93); }

    /* ===== 右パネル（結果） ===== */
    .right-panel {
      background: var(--bg-right);
      padding: 18px 20px 14px;
      display: flex;
      flex-direction: column;
      border-radius: 0 0 var(--radius) 0;
    }

    .result-area {
      flex: 1;
      min-height: 150px;
    }

    .result-placeholder {
      color: #D0D0D0;
      font-size: 15px;
      line-height: 1.7;
    }

    .result-text {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text);
      display: none;
      white-space: pre-wrap;
    }

    /* ===== ローディング ===== */
    .loading {
      display: none;
      align-items: center;
      gap: 7px;
      color: var(--text-sub);
      font-size: 13px;
    }

    .loading.show { display: flex; }

    .dot {
      width: 7px; height: 7px;
      background: var(--orange);
      border-radius: 50%;
      animation: bounce 0.65s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.12s; }
    .dot:nth-child(3) { animation-delay: 0.24s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-7px); }
    }

    /* ===== 気分バッジ ===== */
    .mood-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--orange-light);
      border: 1px solid var(--orange-mid);
      border-radius: 10px;
      padding: 9px 14px;
      margin-top: 14px;
      font-size: 13px;
    }

    .mood-badge.show { display: flex; }
    .mood-emoji   { font-size: 22px; }
    .mood-label   { color: var(--text-sub); font-size: 12px; }
    .mood-val     { font-weight: 700; color: var(--orange); }

    /* ===== 下部ツールバー ===== */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--orange-light);
      border-color: var(--orange);
      color: var(--orange);
    }

    .btn-icon {
      padding: 7px;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      justify-content: center;
    }

    .btn-mic.active {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.4); }
      50%       { box-shadow: 0 0 0 7px rgba(255,107,53,0); }
    }

    .spacer { flex: 1; }

    /* ===== トースト ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #333;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.28s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== フッター ===== */
    footer {
      text-align: center;
      color: var(--text-sub);
      font-size: 12px;
      padding: 20px 0 32px;
    }

    /* ===== スマホ対応 ===== */
    @media (max-width: 620px) {
      header { padding: 12px 16px; }
      .logo  { font-size: 19px; }
      main   { margin: 14px auto; padding: 0 10px; }

      .lang-bar, .body {
        grid-template-columns: 1fr;
      }

      .lang-bar-center { display: none; }

      .lang-tab.right {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .center-panel {
        border-left: none;
        border-right: none;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 14px;
        flex-direction: row;
        background: var(--bg-right);
      }

      .right-panel { border-top: 1px solid var(--border); }

      textarea { min-height: 120px; }
      .result-area { min-height: 100px; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div>
    <div class="logo"><span>🐱</span> にゃんぽ翻訳</div>
    <div class="tagline">世界初・猫語自動翻訳システム（非公式・無保証）</div>
  </div>
</header>

<!-- メイン -->
<main>
  <div class="card">

    <!-- 言語ラベル -->
    <div class="lang-bar">
      <div class="lang-tab left">  <span class="icon">🐾</span> 猫語</div>
      <div class="lang-bar-center"></div>
      <div class="lang-tab right"> <span class="icon">💬</span> 人間語</div>
    </div>

    <!-- 本体 -->
    <div class="body">

      <!-- 左：入力 -->
      <div class="left-panel">
        <textarea
          id="catInput"
          placeholder="猫語を入力してください…&#10;例）にゃー　ふーっ　ごろごろ　みゃお"
          maxlength="500"
          oninput="onInput()"
        ></textarea>
        <div class="char-hint"><span id="cnt">0</span> / 500</div>
        <div class="toolbar">
          <button class="btn btn-icon btn-mic" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
          <button class="btn" onclick="clearAll()">✕ クリア</button>
        </div>
      </div>

      <!-- 中央：変換ボタン -->
      <div class="center-panel">
        <button class="translate-btn" onclick="doTranslate()" title="翻訳する（Enter でも可）">🔄</button>
      </div>

      <!-- 右：結果 -->
      <div class="right-panel">
        <div class="result-area">
          <div class="loading" id="loading">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span>解読中…</span>
          </div>
          <p  class="result-placeholder" id="placeholder">翻訳結果がここに表示されます</p>
          <div class="result-text"        id="resultText"></div>
        </div>

        <div class="mood-badge" id="moodBadge">
          <span class="mood-emoji" id="moodEmoji"></span>
          <div>
            <div class="mood-label">🐱 猫の気分</div>
            <div class="mood-val"  id="moodVal"></div>
          </div>
        </div>

        <div class="toolbar" id="resultToolbar" style="display:none">
          <button class="btn" id="speakBtn" onclick="speakResult()">🔊 読み上げ</button>
          <button class="btn"               onclick="copyResult()">📋 コピー</button>
        </div>
      </div>

    </div><!-- /.body -->
  </div><!-- /.card -->
</main>

<footer>🐾 猫語の解釈には個体差があります。参考程度にどうぞ。</footer>

<div class="toast" id="toast">📋 コピーしました！</div>

<!-- ===== JavaScript ===== -->
<script>
// ──────────────────────────────────────────────
// 翻訳辞書
// ──────────────────────────────────────────────
const DICT = [
  {
    rx: [/にゃーにゃー|にゃんにゃん|にゃにゃにゃ/],
    say: [
      "ごはんを今すぐください。もう限界です。",
      "早くしてください！おなかがペコペコです！",
      "ごはん！ごはん！今すぐ！待てません！"
    ],
    mood: { e:"😾", t:"要求モード全開" }
  },
  {
    rx: [/にゃ[ーん]+/],
    say: [
      "なでてください。今だけは許可します。",
      "甘えたい気分です。少しだけかまってください。",
      "あなたのことが好きですよ。まあ今日だけですが。"
    ],
    mood: { e:"😻", t:"甘えたい" }
  },
  {
    rx: [/^にゃ$|　にゃ　|にゃ。|にゃ！/m],
    say: [
      "ちょっといいですか？",
      "ねえ、聞いてますか？",
      "あのう、少しよろしいでしょうか。"
    ],
    mood: { e:"🐱", t:"ふつう" }
  },
  {
    rx: [/ふ[ーっ]+|シャ[ーっ]+|しゃ[ーっ]+/],
    say: [
      "近づかないでください。今日は気分が悪いです。",
      "触らないでください。本気で怒っています。",
      "あなた、今日は嫌いです。どこかへ行ってください。"
    ],
    mood: { e:"😾", t:"本気で不機嫌" }
  },
  {
    rx: [/ごろごろ|ぐるぐる/],
    say: [
      "最高の幸せを感じています。このまま永遠になでていてください。",
      "今は天国にいます。もっとなでてください。絶対に止めないでください。",
      "幸せすぎて溶けそうです。"
    ],
    mood: { e:"😸", t:"最高に幸せ" }
  },
  {
    rx: [/くぅ[ーん]|きゅ[ーん]/],
    say: [
      "眠たいです。もう少しで夢の世界へ行きます。",
      "おなかがちょっとすきました。でも動くのが面倒くさいです。",
      "なんとなく寂しい気分です。でも言いません。"
    ],
    mood: { e:"😴", t:"まったり眠い" }
  },
  {
    rx: [/みゃ[ーあ]+|みゃお/],
    say: [
      "びっくりしました！急に動かないでください！",
      "何かいますか？気配を感じました。",
      "あれ、なんですか？すごく気になります。"
    ],
    mood: { e:"🙀", t:"びっくり" }
  },
  {
    rx: [/ちゅ[るーっ]+|かっかっ|カッカッ/],
    say: [
      "あそこに虫がいます。捕まえたいです。絶対に。",
      "窓の外に鳥がいます。ハンターの血が騒ぎます。",
      "獲物発見。狩りの本能が目覚めています。"
    ],
    mood: { e:"😼", t:"狩猟本能全開" }
  },
  {
    rx: [/ぷぅ|ぷっ|ぷー/],
    say: [
      "それ気に入りません。どけてください。",
      "邪魔です。そこにいないでください。",
      "これじゃないです。別のものをください。"
    ],
    mood: { e:"😾", t:"不満あり" }
  },
  {
    rx: [/zzz|すやすや|すー/i],
    say: [
      "…（寝ています。起こさないでください）",
      "…zzz…おいしい…zzz…（夢を見ています）",
      "…（夢の中で走り回っています）"
    ],
    mood: { e:"😴", t:"爆睡中" }
  },
];

const DEFAULTS = [
  "（解読困難）…おそらく「かまってください」という意味だと思います。",
  "難解な猫語です。「今すぐごはんをください」に違いありません。",
  "高度な猫語です。「そこは私の場所です」という可能性が高いです。",
  "解析完了。「なでてもいいですよ。でも飽きたら怒ります」という意味です。",
  "このフレーズは上位1%の猫語使いしか使いません。たぶん「おやつ」です。"
];

const DEFAULT_MOODS = [
  { e:"🐱", t:"謎めいた気分" },
  { e:"😸", t:"秘密の気分" },
  { e:"🐾", t:"猫的にはふつう" }
];

// 追記ランダム（30%確率）
const EXTRAS = [
  "\n\n（追記：でもやっぱりごはんが欲しいです）",
  "\n\n（P.S. おやつがあれば機嫌が直ります）",
  "\n\n（なお、この翻訳に責任は持てません）"
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function translate(input) {
  if (!input.trim()) return null;
  for (const entry of DICT) {
    for (const rx of entry.rx) {
      if (rx.test(input)) {
        const extra = Math.random() < 0.3 ? pick(EXTRAS) : "";
        return { text: pick(entry.say) + extra, mood: entry.mood };
      }
    }
  }
  return { text: pick(DEFAULTS), mood: pick(DEFAULT_MOODS) };
}

// ──────────────────────────────────────────────
// UI操作
// ──────────────────────────────────────────────
function onInput() {
  document.getElementById('cnt').textContent =
    document.getElementById('catInput').value.length;
}

function clearAll() {
  document.getElementById('catInput').value = '';
  onInput();
  showPlaceholder();
}

function showPlaceholder() {
  document.getElementById('placeholder').style.display  = '';
  document.getElementById('resultText').style.display   = 'none';
  document.getElementById('moodBadge').classList.remove('show');
  document.getElementById('resultToolbar').style.display = 'none';
}

function doTranslate() {
  const input = document.getElementById('catInput').value;
  if (!input.trim()) {
    document.getElementById('catInput').focus();
    return;
  }

  // ローディング表示
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('resultText').style.display  = 'none';
  document.getElementById('moodBadge').classList.remove('show');
  document.getElementById('resultToolbar').style.display = 'none';
  document.getElementById('loading').classList.add('show');

  setTimeout(() => {
    const res = translate(input);
    document.getElementById('loading').classList.remove('show');
    if (!res) return;

    document.getElementById('resultText').textContent = res.text;
    document.getElementById('resultText').style.display = '';
    document.getElementById('moodEmoji').textContent = res.mood.e;
    document.getElementById('moodVal').textContent   = res.mood.t;
    document.getElementById('moodBadge').classList.add('show');
    document.getElementById('resultToolbar').style.display = '';
  }, 550);
}

// Enter で翻訳（Shift+Enter は改行）
document.getElementById('catInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTranslate(); }
});

// ──────────────────────────────────────────────
// 音声入力
// ──────────────────────────────────────────────
let recog = null, isRec = false;

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('このブラウザは音声入力に対応していません。\nGoogle Chrome をお試しください。'); return; }

  if (isRec) { recog.stop(); return; }

  recog = new SR();
  recog.lang = 'ja-JP';
  recog.continuous = false;
  recog.interimResults = false;

  recog.onstart = () => {
    isRec = true;
    const b = document.getElementById('micBtn');
    b.textContent = '⏹';
    b.classList.add('active');
  };

  recog.onresult = e => {
    document.getElementById('catInput').value = e.results[0][0].transcript;
    onInput();
    setTimeout(doTranslate, 300);
  };

  recog.onerror = e => console.warn('音声入力エラー:', e.error);

  recog.onend = () => {
    isRec = false;
    const b = document.getElementById('micBtn');
    b.textContent = '🎤';
    b.classList.remove('active');
  };

  recog.start();
}

// ──────────────────────────────────────────────
// 読み上げ
// ──────────────────────────────────────────────
function speakResult() {
  const text = document.getElementById('resultText').textContent;
  if (!text || !window.speechSynthesis) return;

  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = 'ja-JP';
  u.rate  = 0.88;
  u.pitch = 1.1;

  const btn = document.getElementById('speakBtn');
  btn.textContent = '🔊 読み上げ中…';
  u.onend = () => { btn.textContent = '🔊 読み上げ'; };
  window.speechSynthesis.speak(u);
}

// ──────────────────────────────────────────────
// コピー
// ──────────────────────────────────────────────
function copyResult() {
  const text = document.getElementById('resultText').textContent;
  if (!text) return;

  const show = () => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(show);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    show();
  }
}
</script>
</body>
</html>
